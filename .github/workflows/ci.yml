name: CI

# Usage-conscious triggers (P10, refined for cost control):
# - Correctness gates run on PRs to main; expensive Docker image builds run only AFTER
#   merge to main (Dockerfiles rarely break and are verified before they can ship).
# - Feature-branch pushes never trigger this workflow directly (only via their PR).
# - `concurrency` cancels superseded runs so rapid PR pushes collapse to one run.
# - Draft PRs run ZERO jobs (the `changes` gate is skipped, and everything needs it).
#
# Cost-control refinements (see Docs/Cost Control.md):
# 1. Python checks are path-filtered. The BACKEND project always runs; the 3 auxiliary
#    Python projects (mcp-server, mcp-workbench, agent) run only when their folder
#    changes. On push/dispatch/schedule, everything runs.
# 2. Docker images rebuild only when their Dockerfile or dependency manifest changes — a
#    source-only merge cannot break the build. A workflow change or a manual dispatch
#    rebuilds all images to fully re-verify before a release.
# 3. LIGHT / FULL split, PATH-FILTERED and GATED (hardened 2026-07-23 — closes the gap that let a
#    red backend suite merge on green LIGHT). A PR still runs LIGHT (ruff + mypy + the fast invariant
#    checks) by default, BUT a unit-tested classifier (apps/backend/scripts/ci_classify_changes.py)
#    inspects the changed files and, when any testable backend/deployment path changed, the FULL
#    backend suite (pytest + coverage gates, the `backend-full` job) also runs ON THE PR. Docs-only
#    and unrelated frontend-only PRs stay LIGHT (FULL resolves to N/A). One stable aggregate job,
#    `Backend CI Gate`, ALWAYS runs, fails closed, and is the single required status check on main:
#    it is green only when the classifier proved no testable code changed OR the FULL suite ran and
#    passed (and LIGHT passed). Push-to-main / nightly / dispatch still run FULL unconditionally.
#    NOTE: the required check is enforced by BRANCH PROTECTION, configured in repo settings (not here).
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'Docs/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    # `ready_for_review` is included so the `Backend CI Gate` re-runs (and produces its real verdict on
    # the same head SHA) when a draft is marked ready — otherwise a required check could hang on a draft.
    types: [opened, synchronize, reopened, ready_for_review]
    # NOTE: no `paths-ignore` here. `Backend CI Gate` is a REQUIRED check, and a required check that
    # never runs (because every changed path was ignored) blocks a docs-only PR forever. Instead the
    # workflow always runs on PRs and the unit-tested classifier resolves a docs-only PR to a cheap
    # N/A pass (LIGHT only, no FULL). Push-to-main keeps its docs paths-ignore (no required-check there).
  # Manual full run: rebuilds all images and runs all Python projects. Use before a
  # stable milestone / release to verify everything at once.
  workflow_dispatch: {}
  # Nightly FULL run on main (07:00 UTC) — the safety net for the light/full split:
  # PRs run LIGHT (lint + type + fast invariant checks, no pytest), while pytest +
  # coverage gates run on every push to main AND here nightly. See below.
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap (~10s) change detector. Computes the Python and Docker matrices so jobs whose
  # inputs did not change are skipped. Backend Python is ALWAYS in the matrix.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # Don't spend CI on a draft PR — everything needs this job, so a draft runs zero jobs.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    # dorny/paths-filter lists a PR's changed files via the API (needs pull-requests:read).
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      py_projects: ${{ steps.py.outputs.py_projects }}
      docker_services: ${{ steps.docker.outputs.docker_services }}
      # `code` == 'true' when the PR touches any testable backend/deployment path (⇒ run FULL on the
      # PR). Computed by the unit-tested classifier so the rule is verifiable off GitHub and cannot
      # silently drift. On push/dispatch/schedule it is forced 'true' (FULL always runs there).
      code: ${{ steps.classify.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # list the full set of changed files (`all_files`) so the classifier can decide FULL vs LIGHT
          list-files: json
          filters: |
            all:
              - '**'
            frontend:
              - 'apps/frontend/**'
            mcp_server:
              - 'apps/mcp-server/**'
            mcp_workbench:
              - 'apps/mcp-workbench/**'
            agent:
              - 'apps/agent/**'
            docker_backend:
              - 'apps/backend/Dockerfile'
              - 'apps/backend/pyproject.toml'
            docker_mcp_server:
              - 'apps/mcp-server/Dockerfile'
              - 'apps/mcp-server/pyproject.toml'
            docker_workbench:
              - 'apps/mcp-workbench/Dockerfile'
              - 'apps/mcp-workbench/pyproject.toml'
            docker_agent:
              - 'apps/agent/Dockerfile'
              - 'apps/agent/pyproject.toml'
            docker_frontend:
              - 'apps/frontend/Dockerfile.dev'
              - 'apps/frontend/package.json'
              - 'apps/frontend/pnpm-lock.yaml'
            workflow:
              - '.github/workflows/ci.yml'

      # Decide whether the FULL backend suite must run. On a PR the unit-tested classifier inspects the
      # changed-file list; on push/dispatch/schedule FULL always runs. FAILS CLOSED: a classifier error
      # exits non-zero here, failing this job so `Backend CI Gate` fails closed (never waves a PR through).
      - name: Classify changes (FULL required?)
        id: classify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            printf '%s' '${{ steps.filter.outputs.all_files }}' > "$RUNNER_TEMP/changed.json"
            code=$(python3 apps/backend/scripts/ci_classify_changes.py "$RUNNER_TEMP/changed.json") \
              || { echo "::error::change classifier failed — failing closed"; exit 1; }
          else
            code=true
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "FULL required (code_changed) = $code"

      # Backend always runs (load-bearing invariants). Aux projects run only when their
      # folder changes — except on push/dispatch or a workflow edit, where all run.
      - name: Compute Python matrix
        id: py
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            sel=(backend mcp-server mcp-workbench agent)
          else
            sel=(backend)
            [ "${{ steps.filter.outputs.mcp_server }}" = "true" ] && sel+=(mcp-server)
            [ "${{ steps.filter.outputs.mcp_workbench }}" = "true" ] && sel+=(mcp-workbench)
            [ "${{ steps.filter.outputs.agent }}" = "true" ] && sel+=(agent)
          fi
          json='[]'
          for p in "${sel[@]}"; do
            case "$p" in backend) s=app;; *) s=src;; esac
            json=$(printf '%s' "$json" | jq -c --arg p "$p" --arg d "apps/$p" --arg s "$s" '. + [{project:$p,dir:$d,src:$s}]')
          done
          json=$(printf '%s' "$json" | jq -c 'unique_by(.project)')
          echo "py_projects=$json" >> "$GITHUB_OUTPUT"
          echo "Python matrix: $json"

      # Docker images rebuild only when their Dockerfile / dependency manifest changes.
      # A workflow edit or a manual dispatch rebuilds all images to fully re-verify.
      - name: Compute Docker matrix
        id: docker
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.workflow }}" = "true" ]; then
            sel=(backend mcp-server workbench-mcp agent frontend)
          else
            sel=()
            [ "${{ steps.filter.outputs.docker_backend }}" = "true" ] && sel+=(backend)
            [ "${{ steps.filter.outputs.docker_mcp_server }}" = "true" ] && sel+=(mcp-server)
            [ "${{ steps.filter.outputs.docker_workbench }}" = "true" ] && sel+=(workbench-mcp)
            [ "${{ steps.filter.outputs.docker_agent }}" = "true" ] && sel+=(agent)
            [ "${{ steps.filter.outputs.docker_frontend }}" = "true" ] && sel+=(frontend)
          fi
          json='[]'
          for svc in "${sel[@]}"; do
            case "$svc" in
              backend) ctx=apps/backend; df=apps/backend/Dockerfile;;
              mcp-server) ctx=apps/mcp-server; df=apps/mcp-server/Dockerfile;;
              workbench-mcp) ctx=apps/mcp-workbench; df=apps/mcp-workbench/Dockerfile;;
              agent) ctx=apps/agent; df=apps/agent/Dockerfile;;
              frontend) ctx=apps/frontend; df=apps/frontend/Dockerfile.dev;;
            esac
            json=$(printf '%s' "$json" | jq -c --arg s "$svc" --arg c "$ctx" --arg f "$df" '. + [{service:$s,context:$c,dockerfile:$f}]')
          done
          echo "docker_services=$json" >> "$GITHUB_OUTPUT"
          echo "Docker matrix: $json"

  python-checks:
    name: Python (${{ matrix.p.project }})
    needs: changes
    # Never empty when reached (backend is always present); guard is belt-and-suspenders.
    if: needs.changes.outputs.py_projects != '' && needs.changes.outputs.py_projects != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        p: ${{ fromJSON(needs.changes.outputs.py_projects) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.p.dir }}/pyproject.toml

      - name: Install ${{ matrix.p.project }}
        working-directory: ${{ matrix.p.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: ${{ matrix.p.dir }}
        run: ruff check .

      - name: Mypy
        working-directory: ${{ matrix.p.dir }}
        run: mypy ${{ matrix.p.src }}

      # ADR 0043 loss-control gate — runs on PRs TOO (no FULL guard), because the loss-control
      # state-machine service is the first safety-critical, behaviour-bearing component of the
      # architecture and its coverage floor must gate the PR, not just the post-merge run. Runs
      # the full risk suite (which exercises the loss-control tests), produces a scoped branch
      # coverage report (its own file, so it never clobbers the FULL run's coverage.xml), and
      # fails if any required loss-control module is below 0.95 OR absent from the report.
      - name: ADR 0043 loss-control tests + branch-coverage gate (backend)
        if: matrix.p.project == 'backend'
        working-directory: ${{ matrix.p.dir }}
        run: |
          pytest -q tests/risk --cov=app.risk.loss_control --cov-branch \
            --cov-report=xml:coverage-adr0043.xml
          python scripts/check_adr0043_coverage.py coverage-adr0043.xml

      # Migration-graph integrity — one head, no dangling parents. Runs on PRs too so a
      # mis-chained migration is caught before merge, not at deploy.
      - name: Alembic single-head check (backend)
        if: matrix.p.project == 'backend'
        working-directory: ${{ matrix.p.dir }}
        run: python scripts/check_alembic_single_head.py

      # Aux projects (mcp-server, mcp-workbench, agent) run their pytest on FULL events only
      # (~slow). The BACKEND pytest + coverage gates now live in the dedicated `backend-full` job
      # so the required `Backend CI Gate` gets a clean positive signal that the FULL backend suite
      # actually ran — and, crucially, so backend FULL also runs ON A PR whenever the classifier
      # says code changed (closing the split that let a red backend suite merge on green LIGHT).
      - name: Pytest (aux projects, full runs only)
        if: matrix.p.project != 'backend' && github.event_name != 'pull_request'
        working-directory: ${{ matrix.p.dir }}
        run: pytest -q --cov=${{ matrix.p.src }} --cov-branch --cov-report=xml

      - name: Strategy isolation invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_strategy_isolation.sh

      - name: MCP read-only invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_mcp_readonly.sh

      - name: No-LLM-in-order-path invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_no_llm_in_order_path.sh

      - name: Broker isolation invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_broker_isolation.sh

      - name: EAD order-path isolation invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_altdata_order_path_isolation.sh

      - name: EAD reference-only invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_reference_only_invariant.sh

      - name: Loss-control structural invariants (ADR 0043, backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_loss_control_invariants.sh

      - name: Settlement-barrier structural invariant (ADR 0043, backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_settlement_barrier.sh

      - name: Credential env-isolation invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_no_env_credentials.sh

      - name: Audit immutability invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_audit_immutability.sh

      - name: Workbench-MCP read-only invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_workbench_mcp_readonly.sh

      - name: Agent no-DB-access invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_agent_no_db_access.sh

      - name: Eval-harness paper-only invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_eval_harness_paper_only.sh

      - name: LLM-opt-in bypass-gating invariant check (backend)
        if: matrix.p.project == 'backend'
        run: bash apps/backend/scripts/check_llm_optin_bypass_gated.sh

  # The FULL backend suite: pytest (with coverage) + the risk/P2/P3 branch-coverage gates. Runs on
  # every push / dispatch / schedule AND on a PR whenever the classifier flags a testable code change.
  # Its success is the clean positive signal that FULL actually ran + passed; `Backend CI Gate` keys
  # off `needs.backend-full.result`, so a code PR whose pytest is red cannot merge.
  backend-full:
    name: Backend FULL suite
    needs: changes
    if: >-
      github.event_name != 'pull_request'
      || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml
      - name: Install backend
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest (full, with coverage)
        working-directory: apps/backend
        run: pytest -q --cov=app --cov-branch --cov-report=xml
      - name: Risk engine branch-coverage gate
        working-directory: apps/backend
        run: python scripts/check_risk_coverage.py
      - name: P2 module branch-coverage gate
        working-directory: apps/backend
        run: python scripts/check_p2_coverage.py
      - name: P3 module branch-coverage gate
        working-directory: apps/backend
        run: python scripts/check_p3_coverage.py

  # Stable, ALWAYS-RUN aggregate = the single required status check for main. It is never skipped (so
  # branch protection can require it without a PR hanging on a skipped check) and FAILS CLOSED unless
  # either (a) the classifier proved no testable code changed, or (b) the FULL backend suite ran and
  # passed. It also requires the LIGHT/static checks (python-checks) to be green. Require THIS name in
  # branch protection — never a transient matrix job name or a manually dispatched run.
  backend-ci-gate:
    name: Backend CI Gate
    needs: [changes, python-checks, backend-full]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate (fail closed)
        run: |
          event="${{ github.event_name }}"
          changes_result="${{ needs.changes.result }}"
          light_result="${{ needs.python-checks.result }}"
          full_result="${{ needs.backend-full.result }}"
          code="${{ needs.changes.outputs.code }}"
          echo "event=$event changes=$changes_result light(python-checks)=$light_result full=$full_result code_changed=$code"

          # 1) classifier must have succeeded (covers draft-skip, classifier failure, cancellation)
          if [ "$changes_result" != "success" ]; then
            echo "::error::classifier job result='$changes_result' (not success) — failing closed"; exit 1
          fi
          # 2) LIGHT / static checks must be green (python-checks runs ruff + mypy + the fast invariant
          #    checks; backend is always present in that matrix)
          if [ "$light_result" != "success" ]; then
            echo "::error::LIGHT/static checks result='$light_result' — failing closed"; exit 1
          fi
          # 3) FULL requirement
          if [ "$event" != "pull_request" ]; then
            if [ "$full_result" = "success" ]; then
              echo "OK: $event — FULL backend suite passed."; exit 0
            fi
            echo "::error::FULL backend suite result='$full_result' on $event"; exit 1
          fi
          case "$code" in
            true)
              if [ "$full_result" = "success" ]; then
                echo "OK: code changed → FULL backend suite ran and passed."; exit 0
              fi
              echo "::error::code changed but FULL backend suite result='$full_result'"; exit 1 ;;
            false)
              echo "OK: no testable code changed → FULL not applicable; LIGHT passed."; exit 0 ;;
            *)
              echo "::error::unknown code_changed value '$code' — failing closed"; exit 1 ;;
          esac

  frontend-checks:
    name: Frontend
    needs: changes
    # Run when the frontend changed, or on any push/dispatch (full verification).
    if: needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/frontend
        run: pnpm lint

      - name: TypeScript
        working-directory: apps/frontend
        run: pnpm exec tsc --noEmit

      - name: Vitest
        working-directory: apps/frontend
        run: pnpm test

  build-images:
    name: Build image (${{ matrix.img.service }})
    needs: changes
    # Docker builds are the most expensive jobs: only after merge to main (or a manual
    # dispatch), and only for images whose Dockerfile/manifest changed (see Compute
    # Docker matrix). Skipped entirely when nothing needs rebuilding.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.changes.outputs.docker_services != ''
      && needs.changes.outputs.docker_services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJSON(needs.changes.outputs.docker_services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.img.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.img.context }}
          file: ${{ matrix.img.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.img.service }}
          cache-to: type=gha,scope=${{ matrix.img.service }},mode=max
