name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: backend
            dir: apps/backend
            src: app
          - project: mcp-server
            dir: apps/mcp-server
            src: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/pyproject.toml

      - name: Install ${{ matrix.project }}
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: ${{ matrix.dir }}
        run: ruff check .

      - name: Mypy
        working-directory: ${{ matrix.dir }}
        run: mypy ${{ matrix.src }}

      - name: Pytest
        working-directory: ${{ matrix.dir }}
        run: pytest -q --cov=${{ matrix.src }} --cov-branch --cov-report=xml

      - name: Risk engine branch-coverage gate (backend)
        if: matrix.project == 'backend'
        working-directory: ${{ matrix.dir }}
        run: python scripts/check_risk_coverage.py

      - name: P2 module branch-coverage gate (backend)
        if: matrix.project == 'backend'
        working-directory: ${{ matrix.dir }}
        run: python scripts/check_p2_coverage.py

      - name: Strategy isolation invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_strategy_isolation.sh

      - name: MCP read-only invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_mcp_readonly.sh

  frontend-checks:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/frontend
        run: pnpm lint

      - name: TypeScript
        working-directory: apps/frontend
        run: pnpm exec tsc --noEmit

      - name: Vitest
        working-directory: apps/frontend
        run: pnpm test

  build-images:
    name: Build image (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: apps/backend
            dockerfile: apps/backend/Dockerfile
          - service: mcp-server
            context: apps/mcp-server
            dockerfile: apps/mcp-server/Dockerfile
          - service: frontend
            context: apps/frontend
            dockerfile: apps/frontend/Dockerfile.dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
