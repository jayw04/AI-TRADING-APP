name: CI

# Usage-conscious triggers (P10): correctness gates run on PRs to main; the
# expensive Docker image builds run only AFTER merge to main (Dockerfiles rarely
# break and are still verified before they can reach a release). Feature-branch
# pushes never trigger this workflow directly — only via their PR — so a branch
# push does not start a run on its own. `concurrency` cancels superseded runs so
# rapid force-pushes to a PR collapse to a single run.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap (~10s) change detector so jobs whose inputs did not change can be skipped.
  # The backend invariant/coverage gates are NEVER gated on paths — they always run.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # dorny/paths-filter lists a PR's changed files via the API, which needs
    # pull-requests:read (the default token only grants contents:read).
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'

  python-checks:
    name: Python (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: backend
            dir: apps/backend
            src: app
          - project: mcp-server
            dir: apps/mcp-server
            src: src
          - project: mcp-workbench
            dir: apps/mcp-workbench
            src: src
          - project: agent
            dir: apps/agent
            src: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/pyproject.toml

      - name: Install ${{ matrix.project }}
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: ${{ matrix.dir }}
        run: ruff check .

      - name: Mypy
        working-directory: ${{ matrix.dir }}
        run: mypy ${{ matrix.src }}

      - name: Pytest
        working-directory: ${{ matrix.dir }}
        run: pytest -q --cov=${{ matrix.src }} --cov-branch --cov-report=xml

      - name: Risk engine branch-coverage gate (backend)
        if: matrix.project == 'backend'
        working-directory: ${{ matrix.dir }}
        run: python scripts/check_risk_coverage.py

      - name: P2 module branch-coverage gate (backend)
        if: matrix.project == 'backend'
        working-directory: ${{ matrix.dir }}
        run: python scripts/check_p2_coverage.py

      - name: P3 module branch-coverage gate (backend)
        if: matrix.project == 'backend'
        working-directory: ${{ matrix.dir }}
        run: python scripts/check_p3_coverage.py

      - name: Strategy isolation invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_strategy_isolation.sh

      - name: MCP read-only invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_mcp_readonly.sh

      - name: No-LLM-in-order-path invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_no_llm_in_order_path.sh

      - name: Broker isolation invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_broker_isolation.sh

      - name: Credential env-isolation invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_no_env_credentials.sh

      - name: Audit immutability invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_audit_immutability.sh

      - name: Workbench-MCP read-only invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_workbench_mcp_readonly.sh

      - name: Agent no-DB-access invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_agent_no_db_access.sh

      - name: Eval-harness paper-only invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_eval_harness_paper_only.sh

      - name: LLM-opt-in bypass-gating invariant check (backend)
        if: matrix.project == 'backend'
        run: bash apps/backend/scripts/check_llm_optin_bypass_gated.sh

  frontend-checks:
    name: Frontend
    needs: changes
    # Skip on PRs that don't touch the frontend; always run on push to main.
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/frontend
        run: pnpm lint

      - name: TypeScript
        working-directory: apps/frontend
        run: pnpm exec tsc --noEmit

      - name: Vitest
        working-directory: apps/frontend
        run: pnpm test

  build-images:
    name: Build image (${{ matrix.service }})
    # Docker builds are the most expensive jobs; run them only after merge to main
    # (the push trigger above is branches:[main] only), never on every PR push.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: apps/backend
            dockerfile: apps/backend/Dockerfile
          - service: mcp-server
            context: apps/mcp-server
            dockerfile: apps/mcp-server/Dockerfile
          - service: workbench-mcp
            context: apps/mcp-workbench
            dockerfile: apps/mcp-workbench/Dockerfile
          - service: agent
            context: apps/agent
            dockerfile: apps/agent/Dockerfile
          - service: frontend
            context: apps/frontend
            dockerfile: apps/frontend/Dockerfile.dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
