# Frontend served by nginx — the production fix for the slow/blank frontend (ADR 0032
# follow-up). nginx serves the static Vite build and same-origin-proxies /api,/ws,/healthz
# to the backend with keep-alive upstreams + ipv6=off, eliminating BOTH dev mode's slow
# unbundled module loads AND `vite preview`'s intermittent proxy cold-start.
#
# ACTIVATION (post-cutover; laptop or EC2):
#   1) build the static bundle with the existing dev image (reuses installed node_modules,
#      so NO fresh `pnpm install` — Norton-safe):
#        docker compose run --rm --no-deps --entrypoint sh frontend -c "npx vite build"
#   2) bring up the nginx frontend (replaces the dev/preview frontend on :5173):
#        docker compose -f docker-compose.yml -f docker-compose.frontend-nginx.yml up -d --no-deps frontend
#   REVERT to dev:  docker compose up -d --no-deps frontend
#
# On EC2 fold step 1 into provision-from-s3.sh and add this overlay to the COMPOSE list.
services:
  frontend:
    # Drop the dev image build; use nginx serving the prebuilt dist.
    build: !reset null
    image: nginx:1.27-alpine
    container_name: workbench-frontend
    # !override replaces the base list instead of appending (avoids the dev mounts +
    # the dev :5173:5173 port mapping leaking through).
    volumes: !override
      - ./apps/frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    ports: !override
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
