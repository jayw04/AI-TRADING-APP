# Production frontend: nginx serves the static Vite build and reverse-proxies the
# API/WS to the backend on the same origin (so the httpOnly SameSite session cookie
# flows). Replaces `vite preview`, whose dev-grade proxy had an intermittent cold-start
# that blanked pages (ADR 0032 follow-up, 2026-06-30).
#
# Why this fixes the cold-start:
#   - a real reverse proxy with keep-alive upstreams (no per-request connection churn)
#   - `resolver` + variable upstream so a backend restart is picked up (no stale IP)
#   - ipv6=off avoids the AAAA-lookup stall that can add seconds to a cold connect

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA entry point must never be cached, so a new deploy appears on a normal
    # refresh (the hashed /assets/ above stay immutable/cached-hard).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA: every non-asset path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- same-origin reverse proxy to the backend ----
    # Docker's embedded DNS; ipv6=off dodges the AAAA stall seen with the old proxy.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend "backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";   # keep upstream connections alive
        proxy_read_timeout 120s;
    }

    location = /healthz {
        set $backend "backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket (live updates): upgrade + long read timeout.
    location /ws {
        set $backend "backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
